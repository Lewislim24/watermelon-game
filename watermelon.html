<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watermelon — Game Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1a2e;
      --surface: #16213e;
      --border:  #0f3460;
      --amber:   #f9ca24;
      --ink:     #eeeeee;
      --ink-2:   #aaaaaa;
      --accent:  #16a085;
      --ease-quart: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 14px 16px 28px;
      gap: 12px;
    }

    nav { width: 100%; max-width: 420px; }
    nav a {
      color: var(--amber);
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.75;
      transition: opacity 0.1s;
    }
    nav a:hover { opacity: 1; }
    nav a:focus-visible { outline: 1px solid var(--amber); outline-offset: 3px; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(22, 160, 133, 0.4);
    }

    /* Score + Next row */
    #ui { display: flex; gap: 12px; align-items: stretch; }

    #score-panel { display: flex; gap: 12px; }

    .score-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      text-align: center;
      min-width: 80px;
    }
    .score-box .label { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--ink-2); }
    .score-box .value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

    #next-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #next-panel .label { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--ink-2); }
    #next-canvas { display: block; }

    /* Game viewport — exact dimensions required by JS */
    #game-wrap {
      position: relative;
      width: 400px;
      height: 500px;
      border: 2px solid var(--border);
      border-top: 2px dashed var(--border);
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: 0 0 40px rgba(22, 160, 133, 0.08);
    }

    #game-canvas, #ui-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #ui-canvas { pointer-events: none; }

    /* Overlay — starts hidden; no start screen for this game */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 20, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: 1.75rem; font-weight: 700; color: #e74c3c; text-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
    #overlay p  { font-size: 1.1rem; color: var(--ink); }
    #overlay p span { color: var(--amber); font-weight: 700; }

    #restart-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.1s var(--ease-quart);
    }
    #restart-btn:hover  { opacity: 0.9; transform: scale(1.04); }
    #restart-btn:active { transform: scale(0.97); }
    #restart-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

    /* Fruit guide */
    #fruit-guide {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
    }
    .fruit-chip {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink-2);
    }

    @media (prefers-reduced-motion: reduce) {
      #restart-btn { transition: none; }
    }
  </style>
</head>
<body>
  <nav><a href="index.html">← Game Hub</a></nav>
  <h1>🍉 Watermelon</h1>

  <div id="ui">
    <div id="score-panel">
      <div class="score-box">
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">BEST</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
    <div id="next-panel">
      <div class="label">NEXT</div>
      <canvas id="next-canvas" width="60" height="60"></canvas>
    </div>
  </div>

  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
    <canvas id="ui-canvas"></canvas>
    <div id="overlay" class="hidden">
      <h2>Game Over!</h2>
      <p>Score: <span id="final-score">0</span></p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>

  <div id="fruit-guide">
    <span class="fruit-chip">🍒 Cherry</span>
    <span class="fruit-chip">🍓 Strawberry</span>
    <span class="fruit-chip">🍇 Grape</span>
    <span class="fruit-chip">🍊 Dekopon</span>
    <span class="fruit-chip">🍋 Persimmon</span>
    <span class="fruit-chip">🍎 Apple</span>
    <span class="fruit-chip">🍐 Pear</span>
    <span class="fruit-chip">🍑 Peach</span>
    <span class="fruit-chip">🍍 Pineapple</span>
    <span class="fruit-chip">🍈 Melon</span>
    <span class="fruit-chip">🍉 Watermelon</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script>
    const FRUITS = [
      { name: 'Cherry',     emoji: '🍒', radius: 15, color: '#e74c3c', score: 1   },
      { name: 'Strawberry', emoji: '🍓', radius: 20, color: '#e91e63', score: 3   },
      { name: 'Grape',      emoji: '🍇', radius: 28, color: '#9b59b6', score: 6   },
      { name: 'Dekopon',    emoji: '🍊', radius: 37, color: '#e67e22', score: 10  },
      { name: 'Persimmon',  emoji: '🍋', radius: 44, color: '#f39c12', score: 15  },
      { name: 'Apple',      emoji: '🍎', radius: 52, color: '#c0392b', score: 21  },
      { name: 'Pear',       emoji: '🍐', radius: 59, color: '#27ae60', score: 28  },
      { name: 'Peach',      emoji: '🍑', radius: 67, color: '#fd79a8', score: 36  },
      { name: 'Pineapple',  emoji: '🍍', radius: 75, color: '#f1c40f', score: 45  },
      { name: 'Melon',      emoji: '🍈', radius: 84, color: '#2ecc71', score: 55  },
      { name: 'Watermelon', emoji: '🍉', radius: 90, color: '#16a085', score: 100 },
    ];

    const CONTAINER_W = 400, CONTAINER_H = 500, WALL_T = 60, DANGER_Y = 60, DROP_COOLDOWN = 600;
    const { Engine, Render, Runner, Bodies, World, Events } = Matter;

    const gameCanvas = document.getElementById('game-canvas');
    const uiCanvas   = document.getElementById('ui-canvas');
    gameCanvas.width = uiCanvas.width  = CONTAINER_W;
    gameCanvas.height = uiCanvas.height = CONTAINER_H;

    const engine = Engine.create({ gravity: { y: 1.5 } });
    const render = Render.create({
      canvas: gameCanvas, engine,
      options: { width: CONTAINER_W, height: CONTAINER_H, wireframes: false, background: '#0d1117' }
    });
    const runner = Runner.create();

    World.add(engine.world, [
      Bodies.rectangle(CONTAINER_W/2, CONTAINER_H+WALL_T/2, CONTAINER_W+WALL_T*2, WALL_T, { isStatic:true, label:'wall', render:{fillStyle:'#16213e'} }),
      Bodies.rectangle(-WALL_T/2, CONTAINER_H/2, WALL_T, CONTAINER_H*3, { isStatic:true, label:'wall', render:{fillStyle:'#16213e'} }),
      Bodies.rectangle(CONTAINER_W+WALL_T/2, CONTAINER_H/2, WALL_T, CONTAINER_H*3, { isStatic:true, label:'wall', render:{fillStyle:'#16213e'} }),
    ]);

    let score = 0, bestScore = parseInt(localStorage.getItem('wm_best')||'0',10);
    let currentLevel = rand5(), nextLevel = rand5(), aimX = CONTAINER_W/2;
    let isDropping = false, gameOver = false;
    const pendingMerges = new Set();

    function rand5() { return Math.floor(Math.random()*5); }

    function spawnFruit(x, level) {
      const f = FRUITS[level];
      const body = Bodies.circle(Math.max(f.radius, Math.min(CONTAINER_W-f.radius, x)), -f.radius-10, f.radius, {
        restitution:0.25, friction:0.6, frictionAir:0.01, density:0.002,
        label:'fruit', render:{fillStyle:f.color}
      });
      body.fruitLevel = level;
      World.add(engine.world, body);
    }

    Events.on(render, 'afterRender', () => {
      const ctx = render.context;
      for (const body of engine.world.bodies) {
        if (body.label !== 'fruit') continue;
        const f = FRUITS[body.fruitLevel];
        ctx.save();
        ctx.translate(body.position.x, body.position.y);
        ctx.rotate(body.angle);
        ctx.font = `${Math.floor(f.radius*1.1)}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(f.emoji, 0, 2);
        ctx.restore();
      }
    });

    Events.on(engine, 'collisionStart', ({ pairs }) => {
      for (const { bodyA, bodyB } of pairs) {
        if (bodyA.label!=='fruit'||bodyB.label!=='fruit') continue;
        if (bodyA.fruitLevel!==bodyB.fruitLevel||bodyA.fruitLevel>=FRUITS.length-1) continue;
        const key = [bodyA.id,bodyB.id].sort().join('-');
        if (pendingMerges.has(key)) continue;
        pendingMerges.add(key);
        setTimeout(() => {
          pendingMerges.delete(key);
          if (!engine.world.bodies.includes(bodyA)||!engine.world.bodies.includes(bodyB)) return;
          const mx=(bodyA.position.x+bodyB.position.x)/2, my=(bodyA.position.y+bodyB.position.y)/2;
          const lv = bodyA.fruitLevel+1;
          World.remove(engine.world,[bodyA,bodyB]);
          const merged = Bodies.circle(mx,my,FRUITS[lv].radius,{
            restitution:0.25,friction:0.6,frictionAir:0.01,density:0.002,
            label:'fruit',render:{fillStyle:FRUITS[lv].color}
          });
          merged.fruitLevel=lv;
          World.add(engine.world,merged);
          score+=FRUITS[lv].score; updateScoreDOM();
        }, 0);
      }
    });

    Events.on(engine, 'afterUpdate', () => {
      if (gameOver) return;
      for (const body of engine.world.bodies) {
        if (body.label!=='fruit') continue;
        const speed = Math.hypot(body.velocity.x, body.velocity.y);
        const top = body.position.y - FRUITS[body.fruitLevel].radius;
        if (body.position.y>0 && top<DANGER_Y && speed<1.5) { triggerGameOver(); return; }
      }
    });

    function triggerGameOver() {
      gameOver = true;
      if (score>bestScore) { bestScore=score; localStorage.setItem('wm_best',bestScore); }
      document.getElementById('final-score').textContent = score;
      document.getElementById('overlay').classList.remove('hidden');
    }

    function drawAimLine() {
      const ctx = uiCanvas.getContext('2d');
      ctx.clearRect(0,0,CONTAINER_W,CONTAINER_H);
      ctx.save(); ctx.setLineDash([6,5]); ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(aimX,0); ctx.lineTo(aimX,CONTAINER_H); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.setLineDash([5,5]); ctx.strokeStyle='rgba(231,76,60,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(0,DANGER_Y); ctx.lineTo(CONTAINER_W,DANGER_Y); ctx.stroke();
      ctx.fillStyle='rgba(231,76,60,0.35)'; ctx.font='10px system-ui';
      ctx.fillText('DANGER',4,DANGER_Y-3); ctx.restore();
    }

    function updateNextPreview() {
      const c=document.getElementById('next-canvas'), ctx=c.getContext('2d'), f=FRUITS[nextLevel];
      ctx.clearRect(0,0,60,60);
      ctx.beginPath(); ctx.arc(30,30,22,0,Math.PI*2); ctx.fillStyle=f.color; ctx.fill();
      ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(f.emoji,30,32);
    }

    function updateScoreDOM() {
      document.getElementById('score').textContent=score;
      if (score>bestScore) { bestScore=score; document.getElementById('best').textContent=bestScore; }
    }

    const gameWrap = document.getElementById('game-wrap');
    gameWrap.addEventListener('mousemove', e => {
      if (gameOver) return;
      const rect=gameWrap.getBoundingClientRect(), r=FRUITS[currentLevel].radius;
      aimX=Math.max(r,Math.min(CONTAINER_W-r,e.clientX-rect.left)); drawAimLine();
    });
    gameWrap.addEventListener('click', () => {
      if (isDropping||gameOver) return;
      isDropping=true; spawnFruit(aimX,currentLevel);
      currentLevel=nextLevel; nextLevel=rand5(); updateNextPreview();
      setTimeout(()=>{isDropping=false;},DROP_COOLDOWN);
    });
    gameWrap.addEventListener('touchmove', e => {
      e.preventDefault(); if(gameOver) return;
      const rect=gameWrap.getBoundingClientRect(), r=FRUITS[currentLevel].radius;
      aimX=Math.max(r,Math.min(CONTAINER_W-r,e.touches[0].clientX-rect.left)); drawAimLine();
    },{passive:false});
    gameWrap.addEventListener('touchend', e => {
      e.preventDefault(); if(isDropping||gameOver) return;
      isDropping=true; spawnFruit(aimX,currentLevel);
      currentLevel=nextLevel; nextLevel=rand5(); updateNextPreview();
      setTimeout(()=>{isDropping=false;},DROP_COOLDOWN);
    },{passive:false});

    document.getElementById('restart-btn').addEventListener('click', () => {
      World.remove(engine.world, engine.world.bodies.filter(b=>b.label==='fruit'));
      score=0; gameOver=false; isDropping=false;
      currentLevel=rand5(); nextLevel=rand5();
      updateScoreDOM(); updateNextPreview();
      document.getElementById('overlay').classList.add('hidden');
    });

    document.getElementById('best').textContent=bestScore;
    updateNextPreview(); drawAimLine();
    Render.run(render); Runner.run(runner,engine);
  </script>
</body>
</html>
