<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: system-ui, sans-serif;
      padding: 12px 8px; gap: 10px;
    }
    nav { width: 100%; max-width: 420px; }
    nav a { color: #f9ca24; text-decoration: none; font-size: 0.85rem; opacity: 0.8; }
    nav a:hover { opacity: 1; }
    h1 { font-size: 1.6rem; color: #e67e22; text-shadow: 0 0 12px rgba(230,126,34,0.4); }
    .panel { display: flex; gap: 20px; }
    .score-box {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 6px 16px; text-align: center; min-width: 80px;
    }
    .score-box .lbl { font-size: 0.6rem; letter-spacing: 2px; color: #aaa; }
    .score-box .val { font-size: 1.3rem; font-weight: bold; color: #e67e22; }
    #wrap { position: relative; }
    canvas { display: block; border: 2px solid #0f3460; border-radius: 4px; background: #0d1117; cursor: none; }
    #overlay {
      position: absolute; inset: 0; background: rgba(10,10,20,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; border-radius: 4px;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: 1.8rem; color: #e67e22; }
    #overlay .sub { font-size: 0.85rem; color: #aaa; text-align: center; line-height: 1.5; }
    #overlay .result { font-size: 1rem; color: #eee; }
    #overlay .result span { color: #f9ca24; font-weight: bold; }
    .btn {
      background: #e67e22; color: #fff; border: none; border-radius: 8px;
      padding: 10px 28px; font-size: 1rem; font-weight: bold; cursor: pointer;
      transition: opacity 0.1s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: scale(1.04); }
  </style>
</head>
<body>
  <nav><a href="index.html">← Game Hub</a></nav>
  <h1>🧱 Breakout</h1>
  <div class="panel">
    <div class="score-box"><div class="lbl">SCORE</div><div class="val" id="score">0</div></div>
    <div class="score-box"><div class="lbl">BEST</div><div class="val" id="best">0</div></div>
    <div class="score-box"><div class="lbl">LIVES</div><div class="val" id="lives">3</div></div>
  </div>
  <div id="wrap">
    <canvas id="canvas" width="400" height="500"></canvas>
    <div id="overlay">
      <h2>🧱 Breakout</h2>
      <div class="sub">Move mouse or touch to control paddle<br>Break all the bricks!</div>
      <button class="btn" id="start-btn">Start Game</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 400, H = 500;

    const PADDLE_W = 80, PADDLE_H = 10, PADDLE_Y = H - 30;
    const BALL_R = 8;
    const BRICK_COLS = 8, BRICK_ROWS = 6;
    const BRICK_W = Math.floor((W - 20) / BRICK_COLS);
    const BRICK_H = 20, BRICK_PAD = 3;
    const BRICK_TOP = 50;

    const ROW_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
    const ROW_SCORES = [6, 5, 4, 3, 2, 1];

    let paddleX, ballX, ballY, ballVX, ballVY, bricks, score, bestScore, lives, running, raf;
    bestScore = parseInt(localStorage.getItem('breakout_best')||'0', 10);
    document.getElementById('best').textContent = bestScore;

    function initGame() {
      paddleX = W/2 - PADDLE_W/2;
      ballX = W/2; ballY = PADDLE_Y - BALL_R - 1;
      const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI/3;
      const spd = 4.5;
      ballVX = Math.cos(angle)*spd; ballVY = Math.sin(angle)*spd;
      score = 0; lives = 3;
      document.getElementById('score').textContent = 0;
      document.getElementById('lives').textContent = 3;
      bricks = [];
      for (let r=0;r<BRICK_ROWS;r++) {
        for (let c=0;c<BRICK_COLS;c++) {
          bricks.push({ x:10+c*BRICK_W, y:BRICK_TOP+r*(BRICK_H+BRICK_PAD), alive:true, row:r });
        }
      }
      running = true;
      document.getElementById('overlay').classList.add('hidden');
      if (raf) cancelAnimationFrame(raf);
      loop();
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function update() {
      ballX += ballVX;
      ballY += ballVY;

      // Wall bounces
      if (ballX - BALL_R < 0) { ballX = BALL_R; ballVX = Math.abs(ballVX); }
      if (ballX + BALL_R > W) { ballX = W-BALL_R; ballVX = -Math.abs(ballVX); }
      if (ballY - BALL_R < 0) { ballY = BALL_R; ballVY = Math.abs(ballVY); }

      // Paddle collision
      if (ballY + BALL_R >= PADDLE_Y && ballY + BALL_R <= PADDLE_Y + PADDLE_H + Math.abs(ballVY) &&
          ballX >= paddleX - 4 && ballX <= paddleX + PADDLE_W + 4 && ballVY > 0) {
        const hit = (ballX - (paddleX + PADDLE_W/2)) / (PADDLE_W/2);
        const angle = hit * (Math.PI/3);
        const spd = Math.hypot(ballVX, ballVY);
        ballVX = Math.sin(angle) * spd;
        ballVY = -Math.abs(Math.cos(angle) * spd);
        ballY = PADDLE_Y - BALL_R;
      }

      // Ball lost
      if (ballY - BALL_R > H) {
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) { endGame(false); return; }
        ballX = W/2; ballY = PADDLE_Y - BALL_R - 1;
        const a = -Math.PI/2 + (Math.random()-0.5)*Math.PI/3, spd=4.5;
        ballVX = Math.cos(a)*spd; ballVY = Math.sin(a)*spd;
      }

      // Brick collisions
      let alive = 0;
      for (const b of bricks) {
        if (!b.alive) continue;
        alive++;
        const bx2 = b.x+BRICK_W-BRICK_PAD, by2 = b.y+BRICK_H;
        if (ballX+BALL_R > b.x && ballX-BALL_R < bx2 && ballY+BALL_R > b.y && ballY-BALL_R < by2) {
          b.alive = false;
          const overlapL = ballX+BALL_R - b.x, overlapR = bx2 - (ballX-BALL_R);
          const overlapT = ballY+BALL_R - b.y, overlapB = by2 - (ballY-BALL_R);
          const minH = Math.min(overlapL, overlapR), minV = Math.min(overlapT, overlapB);
          if (minH < minV) ballVX = -ballVX; else ballVY = -ballVY;
          score += ROW_SCORES[b.row];
          document.getElementById('score').textContent = score;
          if (score > bestScore) { bestScore=score; localStorage.setItem('breakout_best',bestScore); document.getElementById('best').textContent=bestScore; }
          break;
        }
      }
      if (alive === 0) { endGame(true); }
    }

    function draw() {
      ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);

      // Bricks
      for (const b of bricks) {
        if (!b.alive) continue;
        const color = ROW_COLORS[b.row];
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(b.x+1, b.y+1, BRICK_W-BRICK_PAD-2, BRICK_H-2, 3);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(b.x+2, b.y+2, BRICK_W-BRICK_PAD-4, 3);
      }

      // Paddle
      const grad = ctx.createLinearGradient(paddleX,PADDLE_Y,paddleX+PADDLE_W,PADDLE_Y+PADDLE_H);
      grad.addColorStop(0,'#e67e22'); grad.addColorStop(1,'#d35400');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 5); ctx.fill();

      // Ball
      const bgrad = ctx.createRadialGradient(ballX-2,ballY-2,1,ballX,ballY,BALL_R);
      bgrad.addColorStop(0,'#fff'); bgrad.addColorStop(1,'#e0e0e0');
      ctx.fillStyle = bgrad;
      ctx.beginPath(); ctx.arc(ballX,ballY,BALL_R,0,Math.PI*2); ctx.fill();
    }

    function endGame(won) {
      running = false;
      cancelAnimationFrame(raf);
      const overlay = document.getElementById('overlay');
      overlay.innerHTML = `
        <h2 style="color:${won?'#27ae60':'#e74c3c'}">${won?'You Win! 🎉':'Game Over'}</h2>
        <div class="result">Score: <span>${score}</span></div>
        <button class="btn" id="start-btn">Play Again</button>`;
      overlay.classList.remove('hidden');
      document.getElementById('start-btn').addEventListener('click', initGame);
    }

    // Mouse control
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddleX = Math.max(0, Math.min(W-PADDLE_W, e.clientX - rect.left - PADDLE_W/2));
    });

    // Touch control
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      paddleX = Math.max(0, Math.min(W-PADDLE_W, e.touches[0].clientX - rect.left - PADDLE_W/2));
    }, { passive: false });

    document.getElementById('start-btn').addEventListener('click', initGame);

    // Draw empty board
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  </script>
</body>
</html>
